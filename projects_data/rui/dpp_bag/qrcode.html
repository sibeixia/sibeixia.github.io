<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫描二维码访问网站</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        .qrcode {
            margin: 20px 0;
        }
        .url {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            color: #666;
        }
        .instructions {
            margin-top: 20px;
            color: #666;
            line-height: 1.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>扫描二维码访问网站</h1>
        <div class="qrcode">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=http://10.201.21.23:8000" alt="二维码">
        </div>
        <div class="url">
            http://10.201.21.23:8000
        </div>
        <div class="instructions">
            <p><strong>使用步骤：</strong></p>
            <p>1. 确保手机和电脑连接同一Wi-Fi</p>
            <p>2. 用手机相机或微信扫描上方二维码</p>
            <p>3. 点击弹出的链接即可访问</p>
        </div>
    </div>
</body>
</html>
